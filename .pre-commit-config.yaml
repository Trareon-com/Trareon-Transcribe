default_install_hook_types: [pre-commit, commit-msg]

repos:
  - repo: local
    hooks:
      - id: strip-cursor-coauthor
        name: Strip Cursor Co-authored-by
        language: system
        entry: bash scripts/strip_cursor_coauthor.sh
        stages: [commit-msg]
        always_run: true

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.22
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.28.0
    hooks:
      - id: gitleaks

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml", "-r", "engine", "ui", "export", "setup", "config", "util", "main.py"]
